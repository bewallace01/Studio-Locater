# Static assets come ONLY from `public/` (never the repo root — avoids bundling node_modules).
#
# Cloudflare Pages: set Build output directory to "public" (not "." or repo root).
# Wrangler: `npm run deploy` → staging; `npm run deploy:prod` → this top-level Worker.
name = "studio-locater"
main = "worker.js"
compatibility_date = "2024-01-01"

[assets]
directory = "public"

# Public Sanity read (apicdn) — used for /studios/:slug and /sitemap.xml
# Optional: merge photos/ratings/description from Google Place Details on studio pages:
#   npx wrangler secret put GOOGLE_API_KEY
# (same key as Places API for your app)
[vars]
SANITY_PROJECT_ID = "t0z5ndwm"
SANITY_DATASET = "production"

# Staging Worker (`npm run deploy` uses --env staging; same Sanity dataset as production).
# Secrets (same as default, scoped to this Worker name):
#   npx wrangler secret put GOOGLE_API_KEY --env staging
[env.staging]
name = "studio-locater-staging"

[env.staging.vars]
SANITY_PROJECT_ID = "t0z5ndwm"
SANITY_DATASET = "production"

[env.staging.assets]
directory = "public"
