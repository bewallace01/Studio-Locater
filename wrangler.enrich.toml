# Scheduled enrichment Worker (Google Places + OpenAI → Sanity).
# Deploy: npx wrangler deploy -c wrangler.enrich.toml
#
# Secrets (same names as API worker where possible):
#   npx wrangler secret put SANITY_PROJECT_ID -c wrangler.enrich.toml
#   npx wrangler secret put SANITY_DATASET -c wrangler.enrich.toml
#   npx wrangler secret put SANITY_API_TOKEN -c wrangler.enrich.toml
#   npx wrangler secret put GOOGLE_API_KEY -c wrangler.enrich.toml
#   npx wrangler secret put OPENAI_API_KEY -c wrangler.enrich.toml
# Optional:
#   npx wrangler secret put CRON_SECRET -c wrangler.enrich.toml   # required for GET /run manual trigger
#
# Vars (optional):
#   ENRICH_BATCH_SIZE = "5"   # studios per run (keep low for Worker limits)
#   ENRICH_FORCE = "true"     # re-enrich even when fields already set
#
# Manual test after deploy:
#   curl "https://studio-locater-enrich.<your-subdomain>.workers.dev/run?secret=YOUR_CRON_SECRET"

name = "studio-locater-enrich"
main = "worker-enrich-cron.js"
compatibility_date = "2024-01-01"

# Cloudflare: weekdays 1–7 (1 = Sunday). Not Unix 0–6.
[triggers]
crons = ["0 6 * * 1"]
